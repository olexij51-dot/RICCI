<!DOCTYPE html>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #D4A017;
        text-align: center;
    }

    .checkout-container {
        max-width: 500px;
        margin: 40px auto;
        background: none;
        padding: 0;
        border-radius: 0;
        box-shadow: none;
    }

    .image-carousel {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
    }

    .product-image {
        width: 70%;
        display: block;
        border-radius: 8px;
        transition: opacity 0.2s ease;
    }

    .arrow-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 10px;
        user-select: none;
        opacity: 0.75;
        transition: opacity 0.15s;
        flex-shrink: 0;
    }

    .arrow-btn:hover {
        opacity: 1;
    }

    .arrow-btn::before {
        content: '';
        display: block;
        width: 28px;
        height: 28px;
        border-top: 4px solid black;
        border-right: 4px solid black;
        border-radius: 3px;
    }

    #arrow-left::before  { transform: rotate(-135deg); }
    #arrow-right::before { transform: rotate(45deg); }

    .arrow-btn.hidden {
        visibility: hidden;
        pointer-events: none;
    }

    .sizes button {
        padding: 10px 20px;
        margin: 5px;
        border: 2px solid #000000;
        background: white;
        cursor: pointer;
        border-radius: 5px;
        font-size: 1rem;
    }

    .sizes button:hover  { background: #d6b562; color: white; }
    .sizes button.active { background-color: #b38513; color: white; }

    .product-name {
        font-size: 1.8rem;
        font-weight: bold;
        margin-top: 20px;
    }

    .description {
        font-size: 1rem;
        color: #000000;
        margin-top: 10px;
        line-height: 1.4;
    }
</style>
</head>

    z-index: 999;

// ── CART COUNTER ──────────────────────────────────────────────────────────
const cartCounter = document.getElementById('cart-counter');
cartCounter.addEventListener('click', () => { window.location.href = 'cart.html'; });

let cart = JSON.parse(localStorage.getItem('cart')) || [];
cartCounter.textContent = `🛒 +${cart.length}`;

// ── LOAD PRODUCT ──────────────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const productId = params.get("product");
const product   = products[productId];

if (product) {
    const productImage  = document.getElementById("product-image");
    const productNameEl = document.getElementById("product-name");
    const productDescEl = document.getElementById("product-description");
    const sizeContainer = document.getElementById("sizes");
    const arrowLeft     = document.getElementById("arrow-left");
    const arrowRight    = document.getElementById("arrow-right");

    const variants = product.variants && product.variants.length > 1
        ? product.variants
        : [{ image: product.image, name: product.name, colour: "Original" }];

    let currentVariantIndex = 0;

    if (variants.length > 1) {
        arrowLeft.classList.remove("hidden");
        arrowRight.classList.remove("hidden");
    }

    function loadVariant(index) {
        const v = variants[index];
        productImage.style.opacity = "0";
        setTimeout(() => {
            productImage.src          = v.image;
            productNameEl.textContent = v.name;
            productImage.style.opacity = "1";
        }, 150);
    }

    productNameEl.textContent = variants[0].name;
    productDescEl.textContent = product.description;
    productImage.src          = variants[0].image;

    arrowLeft.addEventListener("click", () => {
        currentVariantIndex = (currentVariantIndex - 1 + variants.length) % variants.length;
        loadVariant(currentVariantIndex);
    });

    arrowRight.addEventListener("click", () => {
        currentVariantIndex = (currentVariantIndex + 1) % variants.length;
        loadVariant(currentVariantIndex);
    });

    product.sizes.forEach(size => {
        const btn = document.createElement("button");
        btn.textContent = size;
        btn.addEventListener("click", () => {
            sizeContainer.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
        });
        sizeContainer.appendChild(btn);
    });

    const addToCartText = document.createElement("div");
    addToCartText.textContent      = "Add to Cart";
    addToCartText.style.marginTop  = "15px";
    addToCartText.style.cursor     = "pointer";
    addToCartText.style.color      = "black";
    addToCartText.style.fontWeight = "bold";
    sizeContainer.parentElement.appendChild(addToCartText);

    addToCartText.addEventListener("click", () => {
        const selectedSizeBtn = sizeContainer.querySelector('button.active');
        if (!selectedSizeBtn) {
            alert('Please select a size first!');
            return;
        }
        const size    = selectedSizeBtn.textContent;
        const variant = variants[currentVariantIndex];
        cart.push({ name: variant.name, colour: variant.colour, size, image: variant.image });
        localStorage.setItem('cart', JSON.stringify(cart));
        cartCounter.textContent = `🛒 +${cart.length}`;
    });
}
