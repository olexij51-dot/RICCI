<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Lock</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #D4A017;
    font-family: 'Segoe UI', sans-serif;
    color: #000;
  }

  .lock-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 30px;
  }

  .code-inputs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .code-inputs input {
    width: 50px;
    height: 50px;
    text-align: center;
    font-size: 2rem;
    border-radius: 8px;
    border: 2px solid #333;
  }

  #message {
    font-size: 1.5rem;
    font-weight: bold;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #message.show {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="lock-container" id="lock-container">
  <h1>Enter Password</h1>

  <div class="code-inputs">
    <input type="text" maxlength="1" />
    <input type="text" maxlength="1" />
    <input type="text" maxlength="1" />
    <input type="text" maxlength="1" />
  </div>

  <div id="message"></div>
</div>

<script>
const correctCode = '1488';
const inputs = document.querySelectorAll('.code-inputs input');
const message = document.getElementById('message');
const lockContainer = document.getElementById('lock-container');

// auto-focus next input
inputs.forEach((input, i) => {
  input.addEventListener('input', () => {
    if (input.value.length === 1 && i < inputs.length - 1) {
      inputs[i + 1].focus();
    }
  });
  input.addEventListener('keydown', e => {
    if(e.key === 'Backspace' && input.value === '' && i > 0) {
      inputs[i - 1].focus();
    }
  });
});

// check code when all inputs filled
function checkCode() {
  const entered = Array.from(inputs).map(input => input.value).join('');
  if (entered.length < 4) return;

  if (entered === correctCode) {
    message.textContent = 'CONGRATULATIONS!';
    message.style.color = 'green';
    message.classList.add('show');

    setTimeout(() => {
      lockContainer.style.display = 'none'; // hide lock
      message.classList.remove('show');
      startBouncing(); // start Devesh face moving
    }, 4000);

  } else {
    message.textContent = 'Maybe next time';
    message.style.color = 'red';
    message.classList.add('show');
    setTimeout(() => {
      message.classList.remove('show');
      inputs.forEach(input => input.value = '');
      inputs[0].focus();
    }, 2000);
  }
}

inputs.forEach(input => input.addEventListener('input', checkCode));
inputs[0].focus();

// -------------------------
// Devesh face bouncing
// -------------------------
function startBouncing() {
  const size = 200; // image size
  const speedRange = [2, 6]; // min and max speed

  // preload the sound
  const bounceSound = new Audio('my tag.wav');

  function createFace() {
    const img = document.createElement('img');
    img.src = 'devesh kumar face.jpeg'; // replace with your image
    img.style.position = 'absolute';
    img.style.width = size + 'px';
    img.style.height = size + 'px';
    document.body.appendChild(img);

    let x = Math.random() * (window.innerWidth - size);
    let y = Math.random() * (window.innerHeight - size);

    let dx = (Math.random() < 0.5 ? -1 : 1) * (Math.random() * (speedRange[1] - speedRange[0]) + speedRange[0]);
    let dy = (Math.random() < 0.5 ? -1 : 1) * (Math.random() * (speedRange[1] - speedRange[0]) + speedRange[0]);

    function animate() {
      x += dx;
      y += dy;

      // check for bounce
      let bounced = false;

      if (x <= 0 || x >= window.innerWidth - size) {
        dx *= -1;
        bounced = true;
      }
      if (y <= 0 || y >= window.innerHeight - size) {
        dy *= -1;
        bounced = true;
      }

      // play sound if bounced
      if (bounced) {
        // clone audio so multiple bounces overlap properly
        const soundClone = bounceSound.cloneNode();
        soundClone.play();
      }

      img.style.left = x + 'px';
      img.style.top = y + 'px';

      requestAnimationFrame(animate);
    }

    animate();

    // spawn a new face when clicked
    img.addEventListener('click', () => {
      createFace();
    });
  }

  // start with one face
  createFace();
}
</script>

</body>
</html>
